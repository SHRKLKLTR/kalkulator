<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>kassa-calculator</title>
<style>
  @font-face {
    font-family: 'system-mono';
    src: local('Courier New');
  }
  :root{
    --cream:#f4f0e6;
    --ink:#1c1a16;
    --line:#c9c2b0;
    --muted:#a39c8a;
    --paper:#faf7ef;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Courier New', ui-monospace, monospace;
    -webkit-font-smoothing:antialiased;
  }
  html{
    height:100%;
  }
  body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px 16px;
  }
  .app{
    width:100%;
    max-width:420px;
    margin:0 auto;
  }
  .app-title{
    text-align:center;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.5px;
    margin-bottom:24px;
  }
  .icon-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
    color:var(--muted);
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
  }
  .icon-row .box{
    width:26px;height:26px;
    border:2px solid var(--muted);
    border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .icon-row .box::before{
    content:"";
    width:10px;height:2px;
    background:var(--muted);
  }

  .zigzag{
    height:14px;
    width:100%;
    background:
      linear-gradient(135deg, var(--ink) 25%, transparent 25%) 0 0,
      linear-gradient(225deg, var(--ink) 25%, transparent 25%) 0 0;
    background-size: 16px 16px;
    background-repeat: repeat-x;
  }

  .card{
    background:var(--paper);
    padding:28px 22px 24px;
  }

  .card-title{
    text-align:center;
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .divider-dashed{
    border:none;
    border-top:1px dashed var(--line);
    margin:14px 0 22px;
  }

  .field{
    margin-bottom:22px;
  }
  .field label{
    display:block;
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#59544a;
    margin-bottom:10px;
  }
  .field input{
    width:100%;
    border:none;
    background:transparent;
    border-bottom:1px solid var(--line);
    font-family:inherit;
    font-size:22px;
    color:var(--ink);
    padding:2px 0 8px;
    outline:none;
  }
  .field input::placeholder{ color:#c2bba8; }
  .field input:focus{ border-bottom:1px solid var(--ink); }

  .result{
    text-align:center;
    margin-top:8px;
  }
  .result .label{
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
    color:#59544a;
    margin-bottom:10px;
  }
  .result .value{
    font-size:44px;
    font-weight:700;
    letter-spacing:1px;
  }
  .result .value.negative{ color:#a33f2b; }

  .reset-link{
    display:block;
    text-align:center;
    margin-top:26px;
    color:#7a7362;
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
    text-decoration:underline;
    text-underline-offset:4px;
    background:none;
    border:none;
    cursor:pointer;
    width:100%;
    font-family:inherit;
  }
  .reset-link:hover{ color:var(--ink); }

  .status{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    margin-top:10px;
    min-height:14px;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="icon-row"><span class="box"></span> Остаток кассы</div>

    <div class="zigzag"></div>
    <div class="card">
      <div class="card-title">Сменный отчёт · Нал. касса</div>
      <hr class="divider-dashed">

      <div class="field">
        <label for="morning">1. Сколько было утром</label>
        <input id="morning" type="number" inputmode="decimal" placeholder="0.00" step="0.01">
      </div>

      <div class="field">
        <label for="revenue">2. Выручка за день</label>
        <input id="revenue" type="number" inputmode="decimal" placeholder="0.00" step="0.01">
      </div>

      <div class="field">
        <label for="addition">3. Внесения в кассу (размен и т.п.)</label>
        <input id="addition" type="number" inputmode="decimal" placeholder="0.00" step="0.01">
      </div>

      <div class="field" style="margin-bottom:14px;">
        <label for="collection">4. Инкассация в конце смены</label>
        <input id="collection" type="number" inputmode="decimal" placeholder="0.00" step="0.01">
      </div>

      <hr class="divider-dashed">

      <div class="result">
        <div class="label">Остаток на утро</div>
        <div class="value" id="result">0,00</div>
      </div>
    </div>
    <div class="zigzag"></div>

    <button class="reset-link" id="resetBtn">Очистить и начать новую смену</button>
  </div>

<script>
  const ids = ['morning','revenue','addition','collection'];
  const inputs = Object.fromEntries(ids.map(id => [id, document.getElementById(id)]));
  const resultEl = document.getElementById('result');

  function fmt(n){
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calc(){
    const morning = parseFloat(inputs.morning.value) || 0;
    const revenue = parseFloat(inputs.revenue.value) || 0;
    const addition = parseFloat(inputs.addition.value) || 0;
    const collection = parseFloat(inputs.collection.value) || 0;
    const total = morning + revenue + addition - collection;
    resultEl.textContent = fmt(total);
    resultEl.classList.toggle('negative', total < 0);
  }

  ids.forEach(id => {
    inputs[id].addEventListener('input', calc);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    ids.forEach(id => inputs[id].value = '');
    calc();
  });

  calc();
</script>
</body>
</html>
